<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Article Studio</title>
    <style>
      :root {
        --bg: #f7f5ef;
        --surface: #fffdf8;
        --surface-2: #f0eee7;
        --ink: #24211b;
        --muted: #726f66;
        --line: #ddd8cb;
        --teal: #0f766e;
        --teal-2: #d6f1eb;
        --coral: #c24a35;
        --amber: #b7791f;
        --violet: #6d5bd0;
        --green: #2f7d46;
        --shadow: 0 18px 50px rgba(55, 46, 28, 0.12);
        --radius: 8px;
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0)),
          var(--bg);
        color: var(--ink);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
      }

      .app {
        display: grid;
        grid-template-rows: 56px minmax(0, 1fr);
        min-height: 100vh;
      }

      .topbar {
        display: grid;
        grid-template-columns: 260px minmax(360px, 1fr) 356px;
        align-items: center;
        gap: 16px;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 253, 248, 0.9);
        backdrop-filter: blur(18px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.95), rgba(194, 74, 53, 0.88)),
          #0f766e;
        position: relative;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.32);
      }

      .mark::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.88);
        border-left: 0;
        border-bottom: 0;
        transform: rotate(45deg);
        top: 9px;
        left: 8px;
      }

      .brand h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1.1;
        font-weight: 780;
        letter-spacing: 0;
      }

      .brand span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .doc-status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-width: 0;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        height: 30px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .icon-btn,
      .text-btn,
      .primary-btn,
      .ghost-btn {
        min-height: 34px;
        border-radius: var(--radius);
        border: 1px solid transparent;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        transition: 0.16s ease;
        user-select: none;
      }

      .icon-btn {
        width: 36px;
        display: inline-grid;
        place-items: center;
        font-weight: 720;
      }

      .text-btn,
      .primary-btn,
      .ghost-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 0 12px;
        font-size: 13px;
        white-space: nowrap;
      }

      .primary-btn {
        background: var(--teal);
        border-color: var(--teal);
        color: white;
      }

      .text-btn {
        background: var(--surface);
        border-color: var(--line);
      }

      .ghost-btn {
        background: transparent;
        border-color: var(--line);
        color: var(--muted);
      }

      .icon-btn:hover,
      .text-btn:hover,
      .ghost-btn:hover {
        border-color: #bbb3a4;
        background: #fffaf0;
      }

      .primary-btn:hover {
        background: #0b625c;
      }

      .shell {
        display: grid;
        grid-template-columns: 260px minmax(420px, 1fr) 356px;
        min-height: 0;
      }

      .sidebar,
      .assistant {
        min-height: 0;
        overflow: auto;
        background: rgba(255, 253, 248, 0.72);
      }

      .sidebar {
        border-right: 1px solid var(--line);
      }

      .assistant {
        border-left: 1px solid var(--line);
      }

      .panel-section {
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      .panel-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .panel-heading h2,
      .panel-heading h3 {
        margin: 0;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 760;
        letter-spacing: 0;
      }

      .search {
        width: 100%;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 0 10px;
        outline: none;
        background: var(--surface);
        color: var(--ink);
      }

      .search:focus,
      .title-input:focus,
      .brief-input:focus,
      .prompt-input:focus,
      select:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
      }

      .article-list {
        display: grid;
        gap: 8px;
      }

      .article-item {
        width: 100%;
        display: grid;
        gap: 7px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        cursor: pointer;
        text-align: left;
      }

      .article-item.active {
        border-color: rgba(15, 118, 110, 0.56);
        background: var(--teal-2);
      }

      .article-item strong {
        font-size: 13px;
        line-height: 1.35;
      }

      .article-item span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        height: 22px;
        padding: 0 7px;
        border-radius: 999px;
        background: #efe7d7;
        color: #69533a;
        font-size: 11px;
        white-space: nowrap;
      }

      .outline {
        display: grid;
        gap: 6px;
      }

      .outline button {
        display: block;
        width: 100%;
        padding: 7px 8px;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        text-align: left;
        cursor: pointer;
      }

      .outline button:hover {
        background: #fff7e8;
        color: var(--ink);
      }

      .outline .empty {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .workspace {
        min-width: 0;
        min-height: 0;
        overflow: auto;
        background:
          linear-gradient(90deg, rgba(15, 118, 110, 0.06), transparent 22%, transparent 78%, rgba(194, 74, 53, 0.05)),
          #fbfaf6;
      }

      .editor-wrap {
        width: min(920px, calc(100% - 40px));
        margin: 22px auto 56px;
      }

      .meta-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 14px;
        margin-bottom: 12px;
      }

      .title-input {
        width: 100%;
        min-height: 56px;
        border: 1px solid transparent;
        border-radius: var(--radius);
        background: transparent;
        color: var(--ink);
        font-size: 34px;
        line-height: 1.16;
        font-weight: 790;
        letter-spacing: 0;
        resize: none;
        outline: none;
        padding: 6px 8px;
      }

      .mode-toggle {
        display: inline-grid;
        grid-template-columns: repeat(3, 1fr);
        width: 198px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        overflow: hidden;
      }

      .mode-toggle button {
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
      }

      .mode-toggle button.active {
        background: var(--ink);
        color: white;
      }

      .brief-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) minmax(150px, 0.7fr);
        gap: 10px;
        margin-bottom: 12px;
      }

      .brief-input,
      .prompt-input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--ink);
        outline: none;
      }

      .brief-input {
        min-height: 44px;
        padding: 10px 12px;
        resize: vertical;
      }

      select {
        height: 44px;
        padding: 0 10px;
      }

      .toolbar {
        position: sticky;
        top: 56px;
        z-index: 5;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px;
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 253, 248, 0.94);
        box-shadow: var(--shadow);
      }

      .toolbar .spacer {
        flex: 1;
        min-width: 8px;
      }

      .editor {
        min-height: 620px;
        padding: 44px 54px 58px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        outline: none;
        line-height: 1.78;
        font-size: 17px;
      }

      .editor:focus {
        border-color: rgba(15, 118, 110, 0.56);
      }

      .editor h2,
      .editor h3 {
        line-height: 1.35;
        margin: 1.45em 0 0.45em;
        letter-spacing: 0;
      }

      .editor h2 {
        font-size: 24px;
      }

      .editor h3 {
        font-size: 20px;
      }

      .editor p {
        margin: 0 0 1em;
      }

      .editor blockquote {
        margin: 1.2em 0;
        padding: 0.1em 0 0.1em 1em;
        border-left: 3px solid var(--teal);
        color: #514d45;
      }

      .editor ul,
      .editor ol {
        padding-left: 1.3em;
      }

      .assistant-tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        background: rgba(255, 253, 248, 0.96);
        z-index: 4;
      }

      .assistant-tabs button {
        height: 32px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
      }

      .assistant-tabs button.active {
        background: var(--ink);
        color: white;
        border-color: var(--ink);
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.active {
        display: block;
      }

      .prompt-input {
        min-height: 86px;
        padding: 10px 12px;
        resize: vertical;
        line-height: 1.5;
      }

      .control-stack {
        display: grid;
        gap: 10px;
      }

      .control-row {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
      }

      .control-row label,
      .range-label {
        color: var(--muted);
        font-size: 12px;
      }

      .range {
        width: 100%;
        accent-color: var(--teal);
      }

      .preset-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .preset-grid button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        cursor: pointer;
        color: var(--ink);
        font-size: 13px;
      }

      .preset-grid button:hover {
        border-color: var(--teal);
        background: var(--teal-2);
      }

      .suggestion-list,
      .version-list {
        display: grid;
        gap: 9px;
      }

      .suggestion,
      .version-item,
      .metric-box {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
      }

      .suggestion {
        padding: 11px;
      }

      .suggestion b {
        display: block;
        margin-bottom: 5px;
        font-size: 13px;
      }

      .suggestion p {
        margin: 0 0 10px;
        color: #4a463f;
        font-size: 13px;
        line-height: 1.55;
      }

      .suggestion-actions {
        display: flex;
        gap: 7px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .metric-box {
        min-height: 82px;
        padding: 10px;
      }

      .metric-box strong {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        font-weight: 660;
      }

      .metric-score {
        margin-top: 8px;
        font-size: 28px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0;
      }

      .bar {
        height: 7px;
        margin-top: 9px;
        border-radius: 999px;
        background: #e7e1d4;
        overflow: hidden;
      }

      .bar span {
        display: block;
        height: 100%;
        width: 50%;
        background: var(--teal);
        border-radius: inherit;
      }

      .checks {
        display: grid;
        gap: 8px;
      }

      .check {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr);
        gap: 8px;
        align-items: start;
        color: #4d493f;
        font-size: 13px;
        line-height: 1.45;
      }

      .check span:first-child {
        width: 20px;
        height: 20px;
        display: inline-grid;
        place-items: center;
        border-radius: 50%;
        background: #efe7d7;
        color: var(--amber);
        font-size: 12px;
        font-weight: 800;
      }

      .check.good span:first-child {
        background: #dcedd9;
        color: var(--green);
      }

      .version-item {
        padding: 10px;
      }

      .version-item strong {
        display: block;
        font-size: 13px;
      }

      .version-item span {
        display: block;
        margin: 4px 0 9px;
        color: var(--muted);
        font-size: 12px;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        max-width: min(360px, calc(100vw - 36px));
        padding: 11px 13px;
        border: 1px solid rgba(15, 118, 110, 0.34);
        border-radius: var(--radius);
        background: #ecfaf5;
        color: #174f48;
        box-shadow: var(--shadow);
        transform: translateY(18px);
        opacity: 0;
        pointer-events: none;
        transition: 0.2s ease;
        font-size: 13px;
        z-index: 30;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      @media (max-width: 1120px) {
        .topbar,
        .shell {
          grid-template-columns: 220px minmax(420px, 1fr) 320px;
        }

        .editor {
          padding: 36px 36px 48px;
        }
      }

      @media (max-width: 920px) {
        .app {
          grid-template-rows: auto minmax(0, 1fr);
        }

        .topbar {
          position: static;
          grid-template-columns: 1fr;
          gap: 10px;
          padding: 12px;
        }

        .doc-status,
        .actions {
          justify-content: flex-start;
          overflow-x: auto;
        }

        .shell {
          grid-template-columns: 1fr;
        }

        .sidebar,
        .assistant {
          max-height: none;
          border: 0;
        }

        .sidebar {
          border-bottom: 1px solid var(--line);
        }

        .assistant {
          border-top: 1px solid var(--line);
        }

        .editor-wrap {
          width: min(100% - 24px, 760px);
          margin-top: 14px;
        }

        .meta-row,
        .brief-grid {
          grid-template-columns: 1fr;
        }

        .title-input {
          font-size: 28px;
        }

        .toolbar {
          top: 0;
        }
      }

      @media (max-width: 560px) {
        .editor {
          padding: 24px 18px 36px;
          font-size: 16px;
        }

        .mode-toggle {
          width: 100%;
        }

        .metric-grid,
        .preset-grid {
          grid-template-columns: 1fr;
        }

        .control-row {
          grid-template-columns: 1fr;
          gap: 5px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div>
            <h1>AI Article Studio</h1>
            <span>长文编辑工作台</span>
          </div>
        </div>
        <div class="doc-status" aria-live="polite">
          <span class="status-pill"><span class="dot"></span><span id="saveStatus">已保存</span></span>
          <span class="status-pill" id="wordCount">0 字</span>
          <span class="status-pill" id="readTime">1 分钟读完</span>
        </div>
        <div class="actions">
          <button class="text-btn" id="newArticle" title="新建文章">＋ 新建</button>
          <button class="text-btn" id="snapshotBtn" title="保存快照">◇ 快照</button>
          <button class="primary-btn" id="exportBtn" title="导出文章">⇩ 导出</button>
        </div>
      </header>

      <main class="shell">
        <aside class="sidebar">
          <section class="panel-section">
            <div class="panel-heading">
              <h2>文章</h2>
              <button class="icon-btn" id="duplicateArticle" title="复制当前文章">⧉</button>
            </div>
            <input class="search" id="articleSearch" type="search" placeholder="搜索标题、摘要、标签">
          </section>
          <section class="panel-section">
            <div class="article-list" id="articleList"></div>
          </section>
          <section class="panel-section">
            <div class="panel-heading">
              <h3>大纲</h3>
              <button class="icon-btn" id="refreshOutline" title="刷新大纲">↻</button>
            </div>
            <div class="outline" id="outline"></div>
          </section>
        </aside>

        <section class="workspace">
          <div class="editor-wrap">
            <div class="meta-row">
              <textarea class="title-input" id="titleInput" rows="2" spellcheck="false"></textarea>
              <div class="mode-toggle" role="tablist" aria-label="编辑阶段">
                <button class="active" data-mode="draft">草稿</button>
                <button data-mode="edit">精修</button>
                <button data-mode="publish">发布</button>
              </div>
            </div>
            <div class="brief-grid">
              <textarea class="brief-input" id="briefInput" rows="2" placeholder="一句话说明这篇文章要解决的问题"></textarea>
              <select id="channelSelect" aria-label="发布渠道">
                <option>公众号长文</option>
                <option>小红书笔记</option>
                <option>SEO 博客</option>
                <option>产品更新</option>
                <option>内部知识库</option>
              </select>
            </div>
            <div class="toolbar" aria-label="正文工具栏">
              <button class="icon-btn" data-command="bold" title="加粗">B</button>
              <button class="icon-btn" data-command="italic" title="斜体">I</button>
              <button class="icon-btn" data-block="h2" title="二级标题">H2</button>
              <button class="icon-btn" data-block="h3" title="三级标题">H3</button>
              <button class="icon-btn" data-command="insertUnorderedList" title="列表">•</button>
              <button class="icon-btn" data-block="blockquote" title="引用">"</button>
              <button class="icon-btn" data-command="undo" title="撤销">↶</button>
              <button class="icon-btn" data-command="redo" title="重做">↷</button>
              <span class="spacer"></span>
              <button class="text-btn" id="rewriteSelection" title="改写选中文本">✦ 改写</button>
              <button class="text-btn" id="continueWriting" title="续写当前位置">→ 续写</button>
            </div>
            <article class="editor" id="editor" contenteditable="true" spellcheck="true"></article>
          </div>
        </section>

        <aside class="assistant">
          <nav class="assistant-tabs" aria-label="AI 面板">
            <button class="active" data-tab="compose">写作</button>
            <button data-tab="score">评分</button>
            <button data-tab="versions">版本</button>
          </nav>

          <section class="tab-panel active" id="tab-compose">
            <div class="panel-section control-stack">
              <div class="panel-heading">
                <h2>AI 指令</h2>
              </div>
              <textarea class="prompt-input" id="promptInput" rows="4">把表达改得更清楚、更有说服力，保留作者原本的判断。</textarea>
              <div class="control-row">
                <label for="toneSelect">语气</label>
                <select id="toneSelect">
                  <option>专业克制</option>
                  <option>犀利直接</option>
                  <option>温和解释</option>
                  <option>营销转化</option>
                </select>
              </div>
              <div class="control-row">
                <span class="range-label">篇幅</span>
                <input class="range" id="lengthRange" type="range" min="1" max="3" value="2">
              </div>
              <div class="preset-grid">
                <button data-preset="rewrite">改写选中</button>
                <button data-preset="expand">补充论据</button>
                <button data-preset="titles">生成标题</button>
                <button data-preset="outline">重排结构</button>
              </div>
            </div>
            <div class="panel-section">
              <div class="panel-heading">
                <h3>建议</h3>
                <button class="icon-btn" id="generateSuggestions" title="生成建议">✦</button>
              </div>
              <div class="suggestion-list" id="suggestionList"></div>
            </div>
          </section>

          <section class="tab-panel" id="tab-score">
            <div class="panel-section">
              <div class="panel-heading">
                <h2>质量评分</h2>
                <button class="icon-btn" id="refreshScore" title="刷新评分">↻</button>
              </div>
              <div class="metric-grid" id="metricGrid"></div>
            </div>
            <div class="panel-section">
              <div class="panel-heading">
                <h3>检查项</h3>
              </div>
              <div class="checks" id="checks"></div>
            </div>
          </section>

          <section class="tab-panel" id="tab-versions">
            <div class="panel-section">
              <div class="panel-heading">
                <h2>版本快照</h2>
                <button class="icon-btn" id="clearVersions" title="清空快照">×</button>
              </div>
              <div class="version-list" id="versionList"></div>
            </div>
          </section>
        </aside>
      </main>
    </div>
    <div class="toast" id="toast"></div>

    <script>
      const storageKey = "ai-article-studio-state-v1";
      const now = () => new Date().toISOString();
      const uid = () => Math.random().toString(36).slice(2, 10);

      const starterArticles = [
        {
          id: uid(),
          title: "AI 文章编辑器应该先解决什么问题",
          brief: "让写作者从空白页、结构混乱和反复润色里解放出来。",
          channel: "公众号长文",
          mode: "draft",
          tags: ["产品", "AI 写作", "编辑器"],
          updatedAt: now(),
          html: `
            <p>很多 AI 写作产品把重点放在生成速度上，但长文编辑真正困难的地方通常不是写出第一段，而是持续判断：这一段是否有必要，观点是否站得住，结构是否能带着读者往前走。</p>
            <h2>从空白页开始</h2>
            <p>一个好的编辑器需要先给作者一个可继续工作的起点。它可以生成标题、摘要、大纲和第一版草稿，但更重要的是把这些内容放进同一个可编辑的工作流里。</p>
            <h2>让结构可见</h2>
            <p>长文最怕局部文字漂亮，但整体推进松散。侧边大纲、段落建议、论据缺口和阅读节奏评分，能让作者在编辑时看到文章的骨架。</p>
            <h2>把 AI 放在手边</h2>
            <p>AI 不应该只在一个聊天框里等待指令。它应该理解选中的文本、当前段落、文章目标和发布渠道，然后给出可采纳、可替换、可撤回的建议。</p>
          `,
          versions: []
        },
        {
          id: uid(),
          title: "新品发布稿：从功能清单到用户价值",
          brief: "把产品功能转换成用户能理解、愿意行动的发布故事。",
          channel: "产品更新",
          mode: "edit",
          tags: ["发布", "增长", "转化"],
          updatedAt: now(),
          html: `
            <p>发布稿不是功能说明书。读者真正关心的是：这个变化和我有什么关系，它能不能替我节省时间、降低风险，或者带来新的机会。</p>
            <h2>先说场景</h2>
            <p>把更新放进一个具体工作场景里，读者会更快理解产品变化的意义。</p>
            <h2>再说能力</h2>
            <p>功能细节要服务于场景，不要让术语抢走主线。</p>
          `,
          versions: []
        }
      ];

      const elements = {
        articleList: document.querySelector("#articleList"),
        articleSearch: document.querySelector("#articleSearch"),
        outline: document.querySelector("#outline"),
        titleInput: document.querySelector("#titleInput"),
        briefInput: document.querySelector("#briefInput"),
        channelSelect: document.querySelector("#channelSelect"),
        editor: document.querySelector("#editor"),
        saveStatus: document.querySelector("#saveStatus"),
        wordCount: document.querySelector("#wordCount"),
        readTime: document.querySelector("#readTime"),
        suggestionList: document.querySelector("#suggestionList"),
        promptInput: document.querySelector("#promptInput"),
        toneSelect: document.querySelector("#toneSelect"),
        lengthRange: document.querySelector("#lengthRange"),
        metricGrid: document.querySelector("#metricGrid"),
        checks: document.querySelector("#checks"),
        versionList: document.querySelector("#versionList"),
        toast: document.querySelector("#toast")
      };

      let state = loadState();
      let saveTimer;
      let lastSelection = null;

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey));
          if (saved && Array.isArray(saved.articles) && saved.articles.length) {
            return saved;
          }
        } catch {}
        return {
          currentId: starterArticles[0].id,
          articles: starterArticles
        };
      }

      function persist() {
        elements.saveStatus.textContent = "保存中";
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          localStorage.setItem(storageKey, JSON.stringify(state));
          elements.saveStatus.textContent = "已保存";
        }, 260);
      }

      function currentArticle() {
        return state.articles.find((article) => article.id === state.currentId) || state.articles[0];
      }

      function plainText(html = elements.editor.innerHTML) {
        const node = document.createElement("div");
        node.innerHTML = html;
        return (node.textContent || "").replace(/\s+/g, " ").trim();
      }

      function renderAll() {
        const article = currentArticle();
        elements.titleInput.value = article.title;
        elements.briefInput.value = article.brief || "";
        elements.channelSelect.value = article.channel || "公众号长文";
        elements.editor.innerHTML = article.html;
        document.querySelectorAll(".mode-toggle button").forEach((button) => {
          button.classList.toggle("active", button.dataset.mode === article.mode);
        });
        renderArticleList();
        renderOutline();
        renderStats();
        renderSuggestions();
        renderScore();
        renderVersions();
      }

      function renderArticleList() {
        const query = elements.articleSearch.value.trim().toLowerCase();
        elements.articleList.innerHTML = "";
        state.articles
          .filter((article) => {
            const haystack = `${article.title} ${article.brief} ${(article.tags || []).join(" ")}`.toLowerCase();
            return haystack.includes(query);
          })
          .forEach((article) => {
            const button = document.createElement("button");
            button.className = `article-item${article.id === state.currentId ? " active" : ""}`;
            button.innerHTML = `
              <strong>${escapeHtml(article.title || "未命名文章")}</strong>
              <span>${escapeHtml(article.brief || "暂无摘要")}</span>
              <span>${formatDate(article.updatedAt)} · ${plainText(article.html).length} 字</span>
              <span class="tag-row">${(article.tags || []).slice(0, 3).map((tag) => `<i class="tag">${escapeHtml(tag)}</i>`).join("")}</span>
            `;
            button.addEventListener("click", () => {
              saveCurrentArticle();
              state.currentId = article.id;
              renderAll();
              persist();
            });
            elements.articleList.append(button);
          });
      }

      function renderOutline() {
        const headings = [...elements.editor.querySelectorAll("h2, h3")];
        elements.outline.innerHTML = "";
        if (!headings.length) {
          elements.outline.innerHTML = '<div class="empty">正文里加入 H2 或 H3 后会生成大纲。</div>';
          return;
        }
        headings.forEach((heading, index) => {
          const id = `heading-${index}`;
          heading.id = id;
          const button = document.createElement("button");
          button.textContent = `${heading.tagName === "H3" ? "  " : ""}${heading.textContent}`;
          button.addEventListener("click", () => heading.scrollIntoView({ behavior: "smooth", block: "center" }));
          elements.outline.append(button);
        });
      }

      function renderStats() {
        const text = plainText();
        const cjk = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
        const words = text.split(/\s+/).filter(Boolean).length;
        const total = Math.max(cjk, words);
        elements.wordCount.textContent = `${total} 字`;
        elements.readTime.textContent = `${Math.max(1, Math.ceil(total / 450))} 分钟读完`;
      }

      function renderSuggestions(items) {
        const suggestions = items || buildSuggestions();
        elements.suggestionList.innerHTML = "";
        suggestions.forEach((item) => {
          const card = document.createElement("article");
          card.className = "suggestion";
          card.innerHTML = `
            <b>${escapeHtml(item.title)}</b>
            <p>${escapeHtml(item.body)}</p>
            <div class="suggestion-actions">
              <button class="ghost-btn" data-copy>复制</button>
              <button class="text-btn" data-apply>插入</button>
            </div>
          `;
          card.querySelector("[data-copy]").addEventListener("click", async () => {
            await navigator.clipboard.writeText(item.body);
            showToast("建议已复制");
          });
          card.querySelector("[data-apply]").addEventListener("click", () => {
            insertAtCursor(`<p>${escapeHtml(item.body)}</p>`);
            saveCurrentArticle();
            refreshWorkspace();
            showToast("已插入建议");
          });
          elements.suggestionList.append(card);
        });
      }

      function buildSuggestions() {
        const article = currentArticle();
        const text = plainText();
        const headings = [...elements.editor.querySelectorAll("h2")].map((node) => node.textContent.trim());
        const brief = article.brief || "这篇文章的核心问题";
        const opening = text.length < 120
          ? "先补一段明确的开场，把读者的问题、文章立场和承诺结果放在前三句话里。"
          : "开头已经具备主题，可以再加一句更具体的读者场景，让进入感更强。";
        const structure = headings.length < 3
          ? "建议拆出 3 到 5 个二级标题：问题、原因、解决路径、案例或行动清单。"
          : `当前结构包含 ${headings.length} 个主段落，可以检查每个标题是否都在推进同一个结论。`;
        const channel = article.channel || "公众号长文";
        return [
          { title: "开场", body: opening },
          { title: "结构", body: structure },
          { title: "转化", body: `面向${channel}，结尾可以增加一个低压力行动：收藏、评论一个真实问题，或进入下一步试用。` },
          { title: "论据", body: `围绕“${brief}”，补充一个具体例子，比继续堆观点更能提升可信度。` }
        ];
      }

      function renderScore() {
        const scores = calculateScores();
        elements.metricGrid.innerHTML = "";
        scores.metrics.forEach((metric) => {
          const box = document.createElement("div");
          box.className = "metric-box";
          box.innerHTML = `
            <strong>${metric.name}<span>${metric.label}</span></strong>
            <div class="metric-score">${metric.score}</div>
            <div class="bar"><span style="width:${metric.score}%"></span></div>
          `;
          elements.metricGrid.append(box);
        });
        elements.checks.innerHTML = "";
        scores.checks.forEach((check) => {
          const row = document.createElement("div");
          row.className = `check${check.good ? " good" : ""}`;
          row.innerHTML = `<span>${check.good ? "✓" : "!"}</span><span>${escapeHtml(check.text)}</span>`;
          elements.checks.append(row);
        });
      }

      function calculateScores() {
        const text = plainText();
        const paragraphs = [...elements.editor.querySelectorAll("p")].filter((node) => node.textContent.trim().length);
        const headings = [...elements.editor.querySelectorAll("h2, h3")];
        const avgParagraph = paragraphs.length ? text.length / paragraphs.length : text.length;
        const hasQuestion = /[?？]/.test(text + currentArticle().title);
        const hasAction = /(收藏|评论|试用|下载|联系|订阅|开始|申请|分享)/.test(text);
        const hasEvidence = /(例如|比如|数据|案例|研究|因为|所以|首先|其次)/.test(text);
        const metrics = [
          { name: "清晰度", score: clamp(68 + (avgParagraph < 180 ? 14 : -8) + (hasQuestion ? 6 : 0)), label: "表达" },
          { name: "结构", score: clamp(52 + headings.length * 11 + (paragraphs.length > 4 ? 8 : 0)), label: "骨架" },
          { name: "可信度", score: clamp(50 + (hasEvidence ? 24 : 0) + Math.min(18, paragraphs.length * 2)), label: "论据" },
          { name: "转化", score: clamp(48 + (hasAction ? 28 : 0) + (currentArticle().brief ? 10 : 0)), label: "行动" }
        ];
        const checks = [
          { good: currentArticle().title.length >= 12, text: "标题足够具体，能承载明确读者预期。" },
          { good: headings.length >= 3, text: "文章结构建议至少包含 3 个主要段落。" },
          { good: hasEvidence, text: "正文需要案例、数据或因果解释来支撑观点。" },
          { good: avgParagraph < 220, text: "段落长度适合移动端阅读。" },
          { good: hasAction, text: "结尾最好给读者一个自然的下一步。" }
        ];
        return { metrics, checks };
      }

      function saveCurrentArticle() {
        const article = currentArticle();
        article.title = elements.titleInput.value.trim() || "未命名文章";
        article.brief = elements.briefInput.value.trim();
        article.channel = elements.channelSelect.value;
        article.html = elements.editor.innerHTML;
        article.updatedAt = now();
      }

      function refreshWorkspace() {
        saveCurrentArticle();
        renderStats();
        renderOutline();
        renderArticleList();
        renderScore();
        persist();
      }

      function rewriteSelectedText() {
        restoreSelection();
        const selection = window.getSelection();
        const selected = selection ? selection.toString().trim() : "";
        if (!selected) {
          showToast("先选中一段文字再改写");
          return;
        }
        const rewritten = createRewrite(selected);
        document.execCommand("insertText", false, rewritten);
        refreshWorkspace();
        showToast("选中文本已改写");
      }

      function createRewrite(text) {
        const tone = elements.toneSelect.value;
        const prompt = elements.promptInput.value.trim();
        const prefix = {
          "专业克制": "更清楚地说，",
          "犀利直接": "换个更直接的说法，",
          "温和解释": "可以这样理解：",
          "营销转化": "对读者来说，"
        }[tone] || "";
        const suffix = elements.lengthRange.value === "3"
          ? " 这不仅能降低理解成本，也能让后续行动更顺畅。"
          : "";
        return `${prefix}${text.replace(/\s+/g, " ")}。${prompt ? ` ${prompt}` : ""}${suffix}`;
      }

      function continueWriting() {
        const article = currentArticle();
        const tone = elements.toneSelect.value;
        const next = `接下来可以继续展开一个更具体的场景：读者在${article.channel || "当前渠道"}里遇到这个问题时，最需要的不是更多信息，而是一个可以立刻判断和执行的路径。用${tone}的语气写，这一段应该把问题、判断和行动连接起来。`;
        insertAtCursor(`<p>${escapeHtml(next)}</p>`);
        refreshWorkspace();
        showToast("已续写一段");
      }

      function insertAtCursor(html) {
        elements.editor.focus();
        restoreSelection();
        document.execCommand("insertHTML", false, html);
      }

      function rememberSelection() {
        const selection = window.getSelection();
        if (selection && selection.rangeCount && elements.editor.contains(selection.anchorNode)) {
          lastSelection = selection.getRangeAt(0).cloneRange();
        }
      }

      function restoreSelection() {
        if (!lastSelection) return;
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(lastSelection);
      }

      function addSnapshot() {
        saveCurrentArticle();
        const article = currentArticle();
        article.versions = article.versions || [];
        article.versions.unshift({
          id: uid(),
          title: article.title,
          brief: article.brief,
          html: article.html,
          createdAt: now(),
          words: plainText(article.html).length
        });
        article.versions = article.versions.slice(0, 12);
        renderVersions();
        persist();
        showToast("已保存快照");
      }

      function renderVersions() {
        const versions = currentArticle().versions || [];
        elements.versionList.innerHTML = "";
        if (!versions.length) {
          elements.versionList.innerHTML = '<div class="outline empty">暂无快照。</div>';
          return;
        }
        versions.forEach((version) => {
          const item = document.createElement("article");
          item.className = "version-item";
          item.innerHTML = `
            <strong>${escapeHtml(version.title)}</strong>
            <span>${formatDate(version.createdAt)} · ${version.words || 0} 字</span>
            <button class="text-btn">恢复</button>
          `;
          item.querySelector("button").addEventListener("click", () => {
            const article = currentArticle();
            article.title = version.title;
            article.brief = version.brief;
            article.html = version.html;
            article.updatedAt = now();
            renderAll();
            persist();
            showToast("已恢复快照");
          });
          elements.versionList.append(item);
        });
      }

      function exportArticle() {
        saveCurrentArticle();
        const article = currentArticle();
        const html = `<!doctype html><html lang="zh-CN"><meta charset="utf-8"><title>${escapeHtml(article.title)}</title><body><h1>${escapeHtml(article.title)}</h1><p>${escapeHtml(article.brief || "")}</p>${article.html}</body></html>`;
        const blob = new Blob([html], { type: "text/html;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${safeFileName(article.title)}.html`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast("已导出 HTML");
      }

      function newArticle() {
        saveCurrentArticle();
        const article = {
          id: uid(),
          title: "新的文章草稿",
          brief: "",
          channel: elements.channelSelect.value || "公众号长文",
          mode: "draft",
          tags: ["草稿"],
          updatedAt: now(),
          html: "<p>从这里开始写第一段。</p><h2>核心观点</h2><p></p>",
          versions: []
        };
        state.articles.unshift(article);
        state.currentId = article.id;
        renderAll();
        persist();
        elements.titleInput.focus();
      }

      function duplicateArticle() {
        saveCurrentArticle();
        const source = currentArticle();
        const copy = {
          ...source,
          id: uid(),
          title: `${source.title} 副本`,
          updatedAt: now(),
          versions: []
        };
        state.articles.unshift(copy);
        state.currentId = copy.id;
        renderAll();
        persist();
        showToast("已复制文章");
      }

      function applyPreset(kind) {
        const article = currentArticle();
        const presets = {
          rewrite: "把选中的段落改得更清楚，删掉重复表达，保留原本含义。",
          expand: `围绕“${article.brief || article.title}”补充一个具体案例和一个判断依据。`,
          titles: `为“${article.title}”生成 5 个更有点击欲望但不过度夸张的标题。`,
          outline: "重排文章结构，让每个标题都服务于同一个结论。"
        };
        elements.promptInput.value = presets[kind] || elements.promptInput.value;
        if (kind === "rewrite") rewriteSelectedText();
        if (kind === "expand") renderSuggestions([{ title: "补充论据", body: `可以加入一个对比案例：改造前，读者需要在多个工具里来回切换；改造后，编辑器在同一处完成结构、润色、检查和导出。这个例子能直接说明“${article.brief || article.title}”。` }]);
        if (kind === "titles") renderSuggestions(buildTitleIdeas(article.title));
        if (kind === "outline") renderSuggestions(buildOutlineIdeas());
      }

      function buildTitleIdeas(title) {
        return [
          { title: "标题方向 A", body: `${title}：别先追求生成速度，先解决编辑判断` },
          { title: "标题方向 B", body: `真正好用的 AI 写作工具，应该藏在编辑流程里` },
          { title: "标题方向 C", body: `从空白页到可发布：AI 编辑器的 4 个关键能力` }
        ];
      }

      function buildOutlineIdeas() {
        return [
          { title: "结构建议", body: "1. 读者遇到的真实问题 2. 现有写作流程为什么低效 3. AI 编辑器如何介入 4. 典型使用场景 5. 行动和转化。" },
          { title: "删减建议", body: "把重复解释合并到一个段落里，把每节结尾改成一句明确判断，读者会更容易跟上主线。" }
        ];
      }

      function formatBlock(tag) {
        elements.editor.focus();
        if (tag === "blockquote") {
          document.execCommand("formatBlock", false, "blockquote");
        } else {
          document.execCommand("formatBlock", false, tag);
        }
        refreshWorkspace();
      }

      function clamp(value) {
        return Math.max(8, Math.min(98, Math.round(value)));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function safeFileName(value) {
        return (value || "article").replace(/[\\/:*?"<>|]/g, "-").slice(0, 60);
      }

      function formatDate(value) {
        const date = new Date(value);
        return `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      }

      function showToast(message) {
        elements.toast.textContent = message;
        elements.toast.classList.add("show");
        setTimeout(() => elements.toast.classList.remove("show"), 1800);
      }

      document.querySelectorAll("[data-command]").forEach((button) => {
        button.addEventListener("click", () => {
          elements.editor.focus();
          document.execCommand(button.dataset.command, false);
          refreshWorkspace();
        });
      });

      document.querySelectorAll("[data-block]").forEach((button) => {
        button.addEventListener("click", () => formatBlock(button.dataset.block));
      });

      document.querySelectorAll(".mode-toggle button").forEach((button) => {
        button.addEventListener("click", () => {
          currentArticle().mode = button.dataset.mode;
          document.querySelectorAll(".mode-toggle button").forEach((item) => item.classList.toggle("active", item === button));
          persist();
        });
      });

      document.querySelectorAll(".assistant-tabs button").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".assistant-tabs button").forEach((item) => item.classList.toggle("active", item === button));
          document.querySelectorAll(".tab-panel").forEach((panel) => panel.classList.toggle("active", panel.id === `tab-${button.dataset.tab}`));
        });
      });

      document.querySelectorAll("[data-preset]").forEach((button) => {
        button.addEventListener("click", () => applyPreset(button.dataset.preset));
      });

      [elements.titleInput, elements.briefInput, elements.channelSelect].forEach((element) => {
        element.addEventListener("input", refreshWorkspace);
        element.addEventListener("change", refreshWorkspace);
      });

      elements.editor.addEventListener("input", refreshWorkspace);
      elements.editor.addEventListener("mouseup", rememberSelection);
      elements.editor.addEventListener("keyup", rememberSelection);
      elements.articleSearch.addEventListener("input", renderArticleList);
      document.querySelector("#newArticle").addEventListener("click", newArticle);
      document.querySelector("#duplicateArticle").addEventListener("click", duplicateArticle);
      document.querySelector("#refreshOutline").addEventListener("click", renderOutline);
      document.querySelector("#rewriteSelection").addEventListener("click", rewriteSelectedText);
      document.querySelector("#continueWriting").addEventListener("click", continueWriting);
      document.querySelector("#snapshotBtn").addEventListener("click", addSnapshot);
      document.querySelector("#exportBtn").addEventListener("click", exportArticle);
      document.querySelector("#generateSuggestions").addEventListener("click", () => {
        renderSuggestions();
        showToast("建议已刷新");
      });
      document.querySelector("#refreshScore").addEventListener("click", () => {
        renderScore();
        showToast("评分已刷新");
      });
      document.querySelector("#clearVersions").addEventListener("click", () => {
        currentArticle().versions = [];
        renderVersions();
        persist();
      });

      renderAll();
    </script>
  </body>
</html>
